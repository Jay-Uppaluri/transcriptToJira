<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      font-size: 12px;
      color: #333;
      padding: 16px;
      background: #fff;
    }
    h2 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .logo { width: 20px; height: 20px; border-radius: 4px; }
    label {
      display: block;
      font-size: 11px;
      font-weight: 500;
      color: #666;
      margin-bottom: 4px;
      margin-top: 12px;
    }
    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 12px;
      outline: none;
    }
    input:focus { border-color: #2383e2; }
    .btn {
      display: block;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 16px;
    }
    .btn-primary { background: #2383e2; color: #fff; }
    .btn-primary:hover { background: #1a6fc4; }
    .btn-danger { background: #e03e3e; color: #fff; }
    .btn-danger:hover { background: #c23333; }
    .status {
      margin-top: 16px;
      padding: 10px;
      border-radius: 6px;
      font-size: 11px;
    }
    .status.connected { background: #e6f4ea; color: #137333; }
    .status.disconnected { background: #fef2f2; color: #e03e3e; }
    .status.idle { background: #f5f5f5; color: #666; }
    .log {
      margin-top: 12px;
      max-height: 150px;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 6px;
      padding: 8px;
      font-family: monospace;
      font-size: 10px;
      color: #555;
      background: #fafafa;
    }
    .log-entry { padding: 2px 0; border-bottom: 1px solid #f0f0f0; }
    .log-entry:last-child { border-bottom: none; }
    .log-entry.error { color: #e03e3e; }
    .log-entry.success { color: #137333; }
  </style>
</head>
<body>
  <h2>
    <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
      <rect width="20" height="20" rx="4" fill="#2383e2"/>
      <text x="4" y="15" fill="white" font-size="12" font-weight="bold">C</text>
    </svg>
    Cortex Plugin
  </h2>

  <div id="setup">
    <label>Server URL</label>
    <input type="text" id="serverUrl" value="http://localhost:3010" placeholder="http://localhost:3010" />

    <label>File Key <span style="color:#999">(from the Figma URL)</span></label>
    <input type="text" id="fileKey" placeholder="e.g., abc123XYZ" />

    <button class="btn btn-primary" id="connectBtn" onclick="startPolling()">Connect</button>
  </div>

  <div id="connected" style="display:none">
    <button class="btn btn-danger" onclick="stopPolling()">Disconnect</button>
  </div>

  <div id="statusBox" class="status idle">Not connected</div>

  <div id="log" class="log"></div>

  <script>
    const serverUrlInput = document.getElementById('serverUrl');
    const fileKeyInput = document.getElementById('fileKey');
    const setupDiv = document.getElementById('setup');
    const connectedDiv = document.getElementById('connected');
    const statusBox = document.getElementById('statusBox');
    const logDiv = document.getElementById('log');

    function addLog(message, type = '') {
      const entry = document.createElement('div');
      entry.className = `log-entry ${type}`;
      entry.textContent = `[${new Date().toLocaleTimeString()}] ${message}`;
      logDiv.prepend(entry);
      // Keep max 50 entries
      while (logDiv.children.length > 50) {
        logDiv.removeChild(logDiv.lastChild);
      }
    }

    function startPolling() {
      const serverUrl = serverUrlInput.value.trim();
      const fileKey = fileKeyInput.value.trim();
      if (!fileKey) {
        statusBox.className = 'status disconnected';
        statusBox.textContent = 'Please enter a file key';
        return;
      }
      parent.postMessage({ pluginMessage: { type: 'start-polling', serverUrl, fileKey } }, '*');
      addLog('Connecting...');
    }

    function stopPolling() {
      parent.postMessage({ pluginMessage: { type: 'stop-polling' } }, '*');
      addLog('Disconnecting...');
    }

    window.onmessage = (event) => {
      const msg = event.data.pluginMessage;
      if (!msg) return;

      if (msg.type === 'status') {
        if (msg.status === 'connected') {
          setupDiv.style.display = 'none';
          connectedDiv.style.display = 'block';
          statusBox.className = 'status connected';
          statusBox.textContent = `Connected — polling for commands (file: ${msg.fileKey})`;
          addLog(`Connected to ${msg.fileKey}`, 'success');
        } else {
          setupDiv.style.display = 'block';
          connectedDiv.style.display = 'none';
          statusBox.className = 'status disconnected';
          statusBox.textContent = 'Disconnected';
          addLog('Disconnected');
        }
      }

      if (msg.type === 'command-received') {
        addLog(`Command received: ${msg.command.command} (${msg.command.id})`);
      }

      if (msg.type === 'command-completed') {
        const success = msg.result?.success;
        addLog(`Command ${msg.commandId}: ${success ? 'completed' : 'failed'}`, success ? 'success' : 'error');
      }

      if (msg.type === 'error') {
        addLog(`Error: ${msg.message}`, 'error');
      }
    };
  </script>
</body>
</html>
